<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate IPL Auction Simulator</title>
    <style>
        /* --- Base Theme & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0f0f0f; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- Start Screen --- */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn-massive { background: #ff9800; color: #000; font-size: 2rem; padding: 20px 40px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: transform 0.2s; box-shadow: 0 0 20px rgba(255, 152, 0, 0.5); }
        .start-btn-massive:hover { transform: scale(1.05); }

        /* --- Header --- */
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: #141414; border-bottom: 1px solid #2a2a2a; }
        .purse-info { color: #ffcc00; font-weight: bold; font-size: 1.2rem; }

        /* --- Main Layout (3 Columns) --- */
        main { width: 100%; max-width: 1200px; padding: 20px; display: grid; grid-template-columns: 2fr 1fr 1.2fr; gap: 20px; display: none; }
        .card { background-color: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        .card-header { font-size: 0.9rem; color: #fff; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px;}

        /* --- Left Side: Player Card --- */
        .player-card { text-align: center; padding: 30px; background: linear-gradient(145deg, #1a1a1a, #111); border: 2px solid #333; border-radius: 12px; position: relative; }
        .player-photo { width: 120px; height: 120px; background-color: #333; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border: 3px solid #ff9800; }
        .player-name { font-size: 2.2rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .player-details { color: #aaa; font-size: 1rem; margin-bottom: 20px; }
        
        /* --- Bidding Area & Timer --- */
        .bid-status { background-color: #000; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; position: relative; overflow: hidden; }
        .current-bid-amount { font-size: 3rem; color: #ffcc00; font-weight: bold; margin: 5px 0; transition: transform 0.1s; }
        .highest-bidder { color: #4ade80; font-size: 1.3rem; font-weight: bold; }
        
        .timer-bar-container { width: 100%; height: 5px; background: #333; margin-top: 15px; border-radius: 5px; }
        .timer-bar { height: 100%; width: 100%; background: #ff4757; transition: width 0.1s linear; }

        /* --- Controls --- */
        .controls-row { display: flex; gap: 10px; }
        .bid-btn { flex: 2; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background-color: #ff9800; color: #000; transition: 0.2s; }
        .bid-btn:hover { background-color: #e68a00; }
        .bid-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        .skip-btn { flex: 1; background-color: #dc2626; color: #fff; }
        .skip-btn:hover { background-color: #b91c1c; }
        .skip-btn:disabled { background-color: #333; color: #555; }

        /* --- Middle Column: Purses & Logs --- */
        .team-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; flex-grow: 1; }
        .team-row { display: flex; justify-content: space-between; background-color: #222; padding: 8px 12px; border-radius: 5px; font-size: 0.85rem; border-left: 4px solid #555; }
        .team-row.csk { border-left-color: #eab308; background-color: rgba(234, 179, 8, 0.1); font-weight: bold; }
        .team-purse { color: #4ade80; }

        .log-area { flex-grow: 1; min-height: 150px; max-height: 250px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #333; font-size: 0.8rem; color: #aaa; display: flex; flex-direction: column; gap: 5px; }
        .log-entry.alert { color: #ffcc00; font-weight: bold; }
        .log-entry.sold { color: #ff4757; font-weight: bold; font-size: 0.95rem; }

        /* --- Right Column: Player Pool & Tabs --- */
        .tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 8px 5px; cursor: pointer; color: #aaa; font-size: 0.85rem; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .tab:hover { color: #fff; }
        .tab.active { color: #ff9800; border-bottom: 2px solid #ff9800; background: rgba(255,152,0,0.1); }

        .upcoming-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 450px; padding-right: 5px; }
        .upcoming-item { display: flex; justify-content: space-between; background-color: #222; padding: 10px; border-radius: 5px; border-left: 3px solid #555; font-size: 0.85rem; }
        .upcoming-item.active { border-left-color: #ff9800; background-color: rgba(255, 152, 0, 0.15); box-shadow: 0 0 10px rgba(255,152,0,0.2); }
        .role-badge { font-size: 0.65rem; background: #333; padding: 2px 6px; border-radius: 4px; color: #aaa; margin-top: 3px; display: inline-block; }
        .role-header { padding: 6px 10px; background: #333; color: #ff9800; font-weight: bold; font-size: 0.8rem; margin-top: 10px; border-radius: 4px; border-left: 3px solid #ff9800; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    </style>
</head>

        // --- 0. AUDIO SYNTHESIZER ENGINE ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'bid') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hammer') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'unsold') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        ];

        // --- 2. GAME STATE ---
        let currentIndex = 0;
        let currentBid = 0;
        let currentWinner = null;
        let botIntentions = []; 
        let hammerTimer;
        let timeLeft = 5000; 
        let botThinkingTimer;
        let currentTab = 'pool';
        let userPassed = false;

        // --- 3. UI INITIALIZATION & UPDATES ---
        function startGame() {
            initAudio();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            updatePursesUI();
            renderPlayerPool();
            setTimeout(loadPlayer, 1000);
        }

        function updatePursesUI() {
            const list = document.getElementById('purseList');
            list.innerHTML = '';
            let sortedTeams = [...teams].sort((a, b) => b.purse - a.purse);
            sortedTeams.forEach(t => {
                list.innerHTML += `<div class="team-row ${t.id === myTeam ? 'csk' : ''}">
                    <span>${t.id}</span>
                    <span class="team-purse">₹${t.purse.toFixed(2)} Cr</span>
                </div>`;
            });
            let myPurseData = teams.find(t => t.id === myTeam);
            document.getElementById('my-purse').innerText = myPurseData.purse.toFixed(2);
        }

        function logAction(msg, type = '') {
            const log = document.getElementById('actionLog');
            log.innerHTML += `<div class="log-entry ${type}">${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function switchTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            renderPlayerPool();
        }

        function renderPlayerPool() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            
            let filteredPlayers = players.map((p, i) => ({ ...p, originalIndex: i }));

            if (currentTab === 'sold') {
                filteredPlayers = filteredPlayers.filter(p => p.status === 'sold');
            } else if (currentTab === 'unsold') {
                filteredPlayers = filteredPlayers.filter(p => p.status === 'unsold');
            } else if (currentTab === 'myteam') {
                filteredPlayers = filteredPlayers.filter(p => p.team === myTeam);
            } else {
                filteredPlayers = filteredPlayers.filter(p => p.status === 'upcoming');
            }

            if(filteredPlayers.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:20px; color:#555; font-style:italic;">No players here yet.</div>`;
                return;
            }

            if (currentTab === 'myteam') {
                const roles = ['Batter', 'Wicketkeeper', 'All-Rounder', 'Bowler'];
                roles.forEach(role => {
                    const rolePlayers = filteredPlayers.filter(p => p.role === role);
                    if (rolePlayers.length > 0) {
                        list.innerHTML += `<div class="role-header">${role}s (${rolePlayers.length})</div>`;
                        rolePlayers.forEach(p => {
                            list.innerHTML += `
                                <div class="upcoming-item" style="border-left-color: #eab308; margin-top: 4px;">
                                    <div>
                                        <div style="font-weight: bold; color: #fff;">${p.name}</div>
                                    </div>
                                    <div><span style="color:#4ade80; font-weight:bold;">₹${p.price.toFixed(2)} Cr</span></div>
                                </div>
                            `;
                        });
                    }
                });
            } else {
                filteredPlayers.forEach((p) => {
                    let isLive = (p.originalIndex === currentIndex);
                    let statusClass = isLive ? 'active' : '';
                    let rightText = '';
                    let borderColor = '#555';
                    
                    if (p.status === 'sold') {
                        rightText = `<span style="color:#4ade80; font-weight:bold;">${p.team} (₹${p.price.toFixed(2)})</span>`;
                        borderColor = '#4ade80';
                    } else if (p.status === 'unsold') {
                        rightText = `<span style="color:#dc2626; font-weight:bold;">UNSOLD</span>`;
                        borderColor = '#dc2626';
                    } else if (isLive) {
                        rightText = `<span style="color:#ffcc00; font-weight:bold;">LIVE</span>`;
                        borderColor = '#ff9800';
                    } else {
                        rightText = `<span style="color:#aaa;">Base: ₹${p.base.toFixed(2)}</span>`;
                    }

                    list.innerHTML += `
                        <div class="upcoming-item ${statusClass}" id="pool-item-${p.originalIndex}" style="border-left-color: ${borderColor}">
                            <div>
                                <div style="font-weight: bold; color: #fff;">${p.name}</div>
                                <span class="role-badge">${p.role}</span>
                            </div>
                            <div>${rightText}</div>
                        </div>
                    `;
                });
            }
        }

        function triggerBidAnimation() {
            const bidText = document.getElementById('display-bid');
            bidText.style.transform = 'scale(1.2)';
            setTimeout(() => { bidText.style.transform = 'scale(1)'; }, 100);
        }

        // --- 4. AUCTION MECHANICS ---
        function loadPlayer() {
            if (currentIndex >= players.length) {
                document.getElementById('display-name').innerText = "Auction Over!";
                document.getElementById('display-photo').innerText = "🏆";
                document.getElementById('bidBtn').style.display = 'none';
                document.getElementById('skipBtn').style.display = 'none';
                return;
            }

            const p = players[currentIndex];
            currentBid = p.base;
            currentWinner = null;
            timeLeft = 5000;
            userPassed = false;

            document.getElementById('display-name').innerText = p.name;
            document.getElementById('display-details').innerText = `${p.role} • Base Price: ₹${p.base.toFixed(2)} Cr`;
            document.getElementById('display-bid').innerText = `₹${currentBid.toFixed(2)} Cr`;
            document.getElementById('display-bidder').innerText = "Awaiting opening bid...";
            document.getElementById('display-bidder').style.color = "#aaa";
            document.getElementById('timer-bar').style.width = '100%';

            document.getElementById('skipBtn').disabled = false;
            document.getElementById('bidBtn').disabled = false;

            renderPlayerPool();
            logAction(`--- ${p.name} is on the block! Base: ₹${p.base}Cr ---`, 'alert');
            
            calculateBotIntentions(p);
            resetHammer();
            triggerBotLogic();
        }

        function calculateBotIntentions(player) {
            botIntentions = [];
            teams.forEach(team => {
                if(team.isBot) {
                    if (Math.random() > 0.2) { 
                        let maxValuation = player.base + (Math.random() * player.hype * 1.5);
                        maxValuation = Math.min(maxValuation, team.purse); 
                        botIntentions.push({ id: team.id, maxBid: maxValuation });
                    }
                }
            });
        }

        // --- 5. THE BIDDING ENGINE ---
        function placeBid(teamId) {
            let teamData = teams.find(t => t.id === teamId);
            let increment = currentBid < 2.00 ? 0.20 : 0.25; 
            let newBid = currentBid + increment;

            if (teamData.purse >= newBid) {
                currentBid = newBid;
                currentWinner = teamId;

                playSound('bid');
                triggerBidAnimation();

                document.getElementById('display-bid').innerText = `₹${currentBid.toFixed(2)} Cr`;
                document.getElementById('display-bidder').innerText = `Current Highest: ${teamId}`;
                document.getElementById('display-bidder').style.color = teamId === 'CSK' ? '#eab308' : '#4ade80';
                
                logAction(`🏏 ${teamId} bids ₹${currentBid.toFixed(2)} Cr`);
                
                resetHammer();
            }
        }

        function placeUserBid() {
            if (currentWinner === 'CSK' || userPassed) return; 
            
            let myPurseData = teams.find(t => t.id === myTeam);
            let increment = currentBid < 2.00 ? 0.20 : 0.25;
            
            if (myPurseData.purse >= (currentBid + increment)) {
                placeBid('CSK');
            } else {
                alert("You don't have enough purse left!");
            }
        }

        function skipPlayer() {
            userPassed = true;
            document.getElementById('bidBtn').disabled = true;
            document.getElementById('skipBtn').disabled = true;
            
            logAction(`⏩ CSK Passed. Auto-simulating remaining bids...`, 'alert');

            clearInterval(hammerTimer);
            clearTimeout(botThinkingTimer);
            document.getElementById('timer-bar').style.width = '0%';

            let activeBots = botIntentions.map(b => {
                let t = teams.find(team => team.id === b.id);
                return { id: b.id, maxBid: Math.min(b.maxBid, t.purse) };
            }).filter(b => b.maxBid > currentBid).sort((a, b) => b.maxBid - a.maxBid);

            if (activeBots.length > 0) {
                let winner = activeBots[0];
                let runnerUp = activeBots.length > 1 ? activeBots[1] : null;

                if (runnerUp && runnerUp.maxBid > currentBid) {
                    let simPrice = runnerUp.maxBid + 0.25;
                    simPrice = Math.min(simPrice, winner.maxBid); 
                    simPrice = Math.ceil(simPrice * 4) / 4; 
                    currentBid = simPrice;
                    currentWinner = winner.id;
                } else if (!currentWinner) {
                    currentWinner = winner.id;
                } else if (currentWinner !== winner.id) {
                    currentBid += (currentBid < 2.00 ? 0.20 : 0.25);
                    currentWinner = winner.id;
                }
            }

            if (currentWinner) {
                document.getElementById('display-bid').innerText = `₹${currentBid.toFixed(2)} Cr`;
                document.getElementById('display-bidder').innerText = `Highest Bid: ${currentWinner}`;
                document.getElementById('display-bidder').style.color = '#4ade80';
            }

            setTimeout(() => {
                sellPlayer();
            }, 1000);
        }

        function triggerBotLogic() {
            clearTimeout(botThinkingTimer);
            let thinkTime = Math.random() * 1500 + 800; 

            botThinkingTimer = setTimeout(() => {
                let willingBots = botIntentions.filter(bot => 
                    bot.maxBid > currentBid + 0.25 && currentWinner !== bot.id
                );

                if (willingBots.length > 0 && !userPassed) {
                    let randomBot = willingBots[Math.floor(Math.random() * willingBots.length)];
                    placeBid(randomBot.id);
                }

                if (timeLeft > 0 && !userPassed) { triggerBotLogic(); }
            }, thinkTime);
        }

        // --- 6. THE HAMMER (TIMER) ---
        function resetHammer() {
            if(userPassed) return; 

            clearInterval(hammerTimer);
            timeLeft = 5000; 
            
            document.getElementById('bidBtn').disabled = (currentWinner === 'CSK');

            hammerTimer = setInterval(() => {
                timeLeft -= 50; 
                let percentage = (timeLeft / 5000) * 100;
                document.getElementById('timer-bar').style.width = `${Math.max(percentage, 0)}%`;

                if (timeLeft <= 0) {
                    clearInterval(hammerTimer);
                    clearTimeout(botThinkingTimer);
                    sellPlayer();
                }
            }, 50);
        }

        function sellPlayer() {
            if (currentWinner) {
                playSound('hammer');
                logAction(`🔨 SOLD! ${players[currentIndex].name} to ${currentWinner} for ₹${currentBid.toFixed(2)} Cr`, 'sold');
                
                let winnerIndex = teams.findIndex(t => t.id === currentWinner);
                teams[winnerIndex].purse -= currentBid;
                
                players[currentIndex].status = 'sold';
                players[currentIndex].price = currentBid;
                players[currentIndex].team = currentWinner;
                
                updatePursesUI();
            } else {
                playSound('unsold');
                logAction(`❌ UNSOLD: ${players[currentIndex].name}`, 'alert');
                players[currentIndex].status = 'unsold';
            }

            renderPlayerPool();
            currentIndex++;
            setTimeout(loadPlayer, 2500); // Wait a bit before next player
        }

    </script>
